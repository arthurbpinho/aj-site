    <!-- Meta Pixel Code -->
    <script>
      // 👉 SUBSTITUA pelo ID do seu Pixel (Gerenciador de Eventos da Meta).
      window.META_PIXEL_ID = "COLE_O_ID_DO_PIXEL_AQUI";

      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');

      // Só inicializa depois que o ID for preenchido (evita erro enquanto está como placeholder).
      if (window.META_PIXEL_ID && window.META_PIXEL_ID !== "COLE_O_ID_DO_PIXEL_AQUI") {

  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA fallback decoder — pairs with public/404.html on GitHub Pages.
      // Restores the deep URL that 404.html encoded into the query string,
      // so React Router sees the real path on load.
      (function () {
        if (window.location.search[1] === "/") {
          var decoded =
            window.location.pathname.replace(/\/$/, "") +
            "/" +
            window.location.search.slice(2).split("&").slice(0, 1).join("").replace(/~and~/g, "&") +
            (window.location.search.split("&").slice(1).join("&")
              ? "?" + window.location.search.split("&").slice(1).join("&").replace(/~and~/g, "&")
              : "") +
            window.location.hash;
          window.history.replaceState(null, "", decoded);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
