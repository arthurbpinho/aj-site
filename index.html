<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/midias/logos/logoverdeescura.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Academia Junguiana — formação séria e acessível em Psicologia Analítica. Cursos, grupos de estudo e assinatura mensal." />
    <meta property="og:title" content="Academia Junguiana" />
    <meta property="og:description" content="Psicologia Analítica: Estudo Sério, Acesso Facilitado." />
    <meta property="og:type" content="website" />
    <title>Academia Junguiana — Psicologia Analítica</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA fallback decoder — pairs with public/404.html on GitHub Pages.
      // Restores the deep URL that 404.html encoded into the query string,
      // so React Router sees the real path on load.
      (function () {
        if (window.location.search.indexOf("?/") === 1) {
          var decoded =
            window.location.pathname.replace(/\/$/, "") +
            "/" +
            window.location.search.slice(2).split("&").slice(0, 1).join("").replace(/~and~/g, "&") +
            (window.location.search.split("&").slice(1).join("&")
              ? "?" + window.location.search.split("&").slice(1).join("&").replace(/~and~/g, "&")
              : "") +
            window.location.hash;
          window.history.replaceState(null, "", decoded);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
