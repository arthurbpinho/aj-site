<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Academia Junguiana</title>
    <script>
      // SPA fallback for GitHub Pages.
      // Redirects any deep URL to the app root, preserving the path/query/hash
      // so React Router can render the correct route on load.
      (function () {
        var segmentCount = 0; // 0 for apex/custom domain (academiajunguiana.com), 1 for /<repo>/ project pages
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?/" +
          l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
